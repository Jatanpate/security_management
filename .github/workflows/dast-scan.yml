name: DAST Scan - OWASP ZAP

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'    # every Sunday 2am - full scan weekly

jobs:
  zap-baseline-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write    # post findings to Security tab
      issues: write             # ZAP can open GitHub issues for findings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start NodeGoat application
        run: |
          docker compose up -d
          echo "Waiting for app to be healthy..."
          sleep 30    # give app time to start

      - name: Verify app is running
        run: |
          curl -f http://localhost:4000 || exit 1
          echo "App is up and running"

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:4000'
          rules_file_name: '.zap/rules.tsv'    # custom rules config
          cmd_options: '-a'                      # include alpha rules
          allow_issue_writing: false             # dont auto create issues
          artifact_name: 'zap-baseline-report'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()    # upload even if scan finds issues
        with:
          name: zap-baseline-report
          path: report_html.html

      - name: Stop application
        if: always()    # always cleanup even if previous steps fail
        run: docker compose down
