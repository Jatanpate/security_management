name: Secrets Scan

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full git history - critical
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml    # use our custom rules

      - name: Upload Gitleaks Report
        if: failure()                     # only upload if secrets found
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
