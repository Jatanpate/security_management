title = "NodeGoat Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api_key|apikey|api-key)\s*=\s*['"]?([a-zA-Z0-9]{20,})['"]?'''
tags = ["api", "key"]

[[rules]]
id = "mongodb-connection-string"
description = "MongoDB Connection String"
regex = '''mongodb(\+srv)?://[^:]+:[^@]+@'''
tags = ["mongodb", "database"]

[allowlist]
paths = [
    '''\.gitleaks\.toml''',
    '''test/.*''',
    '''.*\.md'''
]
commits = []
